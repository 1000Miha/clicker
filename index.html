<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STUPID AHH CLICKER</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #000;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            user-select: none; /* Prevents highlighting text while spamming */
        }

        #counter {
            font-size: 8rem;
            text-shadow: 0 0 20px #ff0000;
            margin-bottom: 20px;
        }

        #click-btn {
            width: 250px;
            height: 250px;
            background: radial-gradient(circle, #ff0000 0%, #800000 100%);
            border: 8px solid #330000;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 15px 0 #440000, 0 20px 30px rgba(255, 0, 0, 0.3);
            outline: none;
            transition: transform 0.0001s; /* Super fast response */
        }

        /* The "Pressed" state */
        #click-btn:active {
            transform: translateY(12px) scale(0.98);
            box-shadow: 0 3px 0 #220000;
        }

        .shake {
            animation: shake 0.1s infinite;
        }

        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            50% { transform: translate(-1px, -2px) rotate(-1deg); }
            100% { transform: translate(1px, -1px) rotate(1deg); }
        }

        .stats {
            margin-top: 30px;
            font-size: 1.2rem;
            color: #555;
        }
    </style>
</head>
<body>

    <div id="counter">0</div>
    
    <button id="click-btn" onmousedown="handleClick()"></button>

    <div class="stats">just click</div>
    <p id="msg" style="color: yellow; margin-top: 10px;"></p>

    <script>
        let count = 0;
        const counterDisplay = document.getElementById('counter');
        const btn = document.getElementById('click-btn');
        const msg = document.getElementById('msg');

        function handleClick() {
            count++;
            counterDisplay.innerText = count;

            // Visual feedback: Shake the button if they click fast
            btn.classList.add('shake');
            setTimeout(() => btn.classList.remove('shake'), 50);

            // Stupid messages
            if (count === 50) msg.innerText = "NICE.";
            if (count === 100) msg.innerText = "ALRIGHT STOP.";
            if (count === 500) msg.innerText = "REALLY THATS ENOUGH.";
            if (count === 1000) msg.innerText = "HOW.";
            if (count === 5000) msg.innerText = "WHAT THE-";
            if (count === 10000) msg.innerText = "DID YOU BREAK YOUR FINGER BY ANY CHANSE?";
            if (count === 20000) msg.innerText = "ur breaking your finger and its concerning";
            if (count === 20000) msg.innerText = "seriously stop";
            if (count === 100000) msg.innerText = "you are either autoclicking or crazy";
        }

        // Prevents the "Holding" cheat by blocking the spacebar repeat
        window.addEventListener('keydown', (e) => {
            if (e.code === "Space" || e.code === "Enter") {
                e.preventDefault();
            }
        });
    </script>
</body>
</html>
